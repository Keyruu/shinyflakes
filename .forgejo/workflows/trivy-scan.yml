on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'nix/hosts/**'
      - 'flake.nix'

jobs:
  vuln-scan:
    runs-on: nixos-x86_64-linux
    concurrency:
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch submodules
        run: |
          git submodule init
          git config submodule."nix/modules/private".url "https://x-access-token:${{ secrets.FORGEJO_PAT }}@git.keyruu.de/lucas/privateflakes.git"
          git submodule update --recursive

      - name: Download Trivy DB
        run: |
          export HOME=$TMPDIR
          trivy image --download-db-only

      - name: Scan containers
        run: |
          export HOME=$TMPDIR
          images=$(nix eval --json '.?submodules=1#lib.allImages' 2>/dev/null || echo '[]')=
          
          for item in $(echo "$images" | jq -c '.[]'); do
            host=$(echo "$item" | jq -r '.host')
            container=$(echo "$item" | jq -r '.container')
            image=$(echo "$item" | jq -r '.image')
            
            echo "Checking ${host} container: ${container} (Image: ${image})"
            trivy image --severity HIGH,CRITICAL --exit-code 1 "$image" || true
          done
